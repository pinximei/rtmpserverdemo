name: Build (manual)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'CMake build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (CMake / VS 2022)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config ${{ inputs.build_type }} --parallel

      - name: List output
        run: |
          dir build\${{ inputs.build_type }}
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RtmpDesktopStreamer-${{ inputs.build_type }}-x64
          path: build/${{ inputs.build_type }}/RtmpDesktopStreamer.exe
          if-no-files-found: error
